---
# yaml-language-server: $schema=https://kubeschema.imranh.org/apps/v1/deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: audiomuse
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: audiomuse
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/part-of: audiomuse
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: audiomuse
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:8.4-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
# yaml-language-server: $schema=https://kubeschema.imranh.org/core/v1/service
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: audiomuse
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: audiomuse
    app.kubernetes.io/component: cache
spec:
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: audiomuse
    app.kubernetes.io/component: cache
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
