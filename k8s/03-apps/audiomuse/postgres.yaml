---
# yaml-language-server: $schema=https://kubeschema.imranh.org/external-secrets.io/v1/externalsecret
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: audiomuse-database
  namespace: audiomuse
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword
  dataFrom:
    - extract:
        key: "Audiomuse database"
  target:
    template:
      engineVersion: v2
      type: Opaque
      data:
        POSTGRES_USER: "{{ .username }}"
        POSTGRES_PASSWORD: "{{ .password }}"
        POSTGRES_DB: "{{ .database }}"
---
# yaml-language-server: $schema=https://kubeschema.imranh.org/apps/v1/statefulset
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: audiomuse
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: audiomuse
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
      app.kubernetes.io/part-of: audiomuse
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: audiomuse
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:18.4-alpine
          envFrom:
            - secretRef:
                name: audiomuse-database
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
        labels:
          backup: daily
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: zfs
        resources:
          requests:
            storage: 4Gi
---
# yaml-language-server: $schema=https://kubeschema.imranh.org/core/v1/service
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: audiomuse
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: audiomuse
    app.kubernetes.io/component: database
spec:
  selector:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: audiomuse
    app.kubernetes.io/component: database
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
