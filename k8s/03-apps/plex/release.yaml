---
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex
  namespace: plex
spec:
  chart:
    spec:
      chart: plex-media-server
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: plex
        namespace: flux-system
      version: "~0.8.0"
  interval: 1h
  values:
    nodeSelector:
      # Sonic Analysis only works on amd64 architectures for now
      kubernetes.io/arch: amd64

    service:
      type: LoadBalancer

    pms:
      configExistingClaim: plex-config
      resources:
        requests:
          cpu: 2000m
          memory: 2Gi
        limits:
          memory: 4Gi

    extraVolumes:
      - name: plex-data
        persistentVolumeClaim:
          claimName: plex-data

    extraVolumeMounts:
      - name: plex-data
        mountPath: /data
        readOnly: true
