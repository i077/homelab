---
# yaml-language-server: $schema=https://kubeschema.imranh.org/helm.toolkit.fluxcd.io/v2/helmrelease
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: plex-media-server
  namespace: plex
spec:
  chart:
    spec:
      chart: plex-media-server
      reconcileStrategy: ChartVersion
      sourceRef:
        kind: HelmRepository
        name: plex
        namespace: flux-system
      version: 1.1.2
  interval: 1h
  values:
    nodeSelector:
      # Sonic Analysis only works on amd64 architectures for now
      kubernetes.io/arch: amd64

    service:
      type: LoadBalancer

    pms:
      configExistingClaim: plex-config
      resources:
        requests:
          cpu: 2000m
          memory: 2Gi
        limits:
          memory: 4Gi

    extraVolumes:
      - name: plex-data
        persistentVolumeClaim:
          claimName: plex-data

    extraVolumeMounts:
      - name: plex-data
        mountPath: /data
