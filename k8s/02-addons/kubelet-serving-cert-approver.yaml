---
# yaml-language-server: $schema=https://kubeschema.imranh.org/core/v1/namespace
apiVersion: v1
kind: Namespace
metadata:
  name: kubelet-csr
  labels:
    app.kubernetes.io/instance: kubelet-serving-cert-approver
    app.kubernetes.io/name: kubelet-serving-cert-approver
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/warn: restricted
---
# yaml-language-server: $schema=https://kubeschema.imranh.org/source.toolkit.fluxcd.io/v1/gitrepository
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: kubelet-serving-cert-approver
  namespace: flux-system
spec:
  interval: 6h
  url: https://github.com/alex1989hu/kubelet-serving-cert-approver.git
  ref:
    tag: v0.10.2
  ignore: |
    /*
    !deploy/base
---
# yaml-language-server: $schema=https://kubeschema.imranh.org/kustomize.toolkit.fluxcd.io/v1/kustomization
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kubelet-serving-cert-approver
  namespace: flux-system
spec:
  interval: 6h
  sourceRef:
    kind: GitRepository
    name: kubelet-serving-cert-approver
  prune: true
  targetNamespace: kubelet-csr
  patches:
    # Deploy into the kubelet-csr namespace instead
    - patch: |-
        apiVersion: v1
        kind: Namespace
        metadata:
          name: kubelet-serving-cert-approver
        $patch: delete
    - target:
        group: rbac.authorization.k8s.io
        version: v1
        kind: RoleBinding
        name: events:kubelet-serving-cert-approver
      patch: |-
        - op: add
          path: /metadata/namespace
          value: default
        - op: add
          path: /subjects/0/namespace
          value: kubelet-csr
    - target:
        group: apps
        version: v1
        kind: Deployment
        name: kubelet-serving-cert-approver
      patch: |-
        - op: add
          path: /spec/template/spec/tolerations
          value:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
        - op: add
          path: /spec/template/spec/containers/0/args/-
          value: --namespace=kubelet-csr
