---
# yaml-language-server: $schema=https://kubeschema.imranh.org/helm.toolkit.fluxcd.io/v2/helmrelease
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: velero
  namespace: storage
spec:
  interval: 6h
  chart:
    spec:
      chart: velero
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
        namespace: flux-system
      version: 10.1.2
  values:
    namespace: {}
    # CRDs managed in layer 01
    upgradeCRDs: false

    resources:
      requests:
        cpu: 500m
        memory: 128Mi
      limits:
        cpu: 1000m
        memory: 512Mi

    # These resources will be created separately
    backupsEnabled: false
    snapshotsEnabled: false

    deployNodeAgent: true
    nodeAgent:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 512Mi

    configuration:
      features: EnableCSI
      repositoryMaintenanceJob:
        requests:
          cpu: 500m
          memory: 512Mi
        limits:
          cpu: 1000m
          memory: 1024Mi

    initContainers:
      - name: velero-plugin-for-aws
        image: velero/velero-plugin-for-aws:v1.12.2
        volumeMounts:
          - mountPath: /target
            name: plugins
