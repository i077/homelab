---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: zfs
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
allowVolumeExpansion: true
parameters:
  poolname: tank
  recordsize: 128k
  compression: zstd
  fstype: zfs
  dedup: "off"
  shared: "yes"
provisioner: zfs.csi.openebs.io
# Let the Kubernetes scheduler decide where PV-bound Pods initially go
volumeBindingMode: WaitForFirstConsumer
