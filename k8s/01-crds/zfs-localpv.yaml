---
# yaml-language-server: $schema=https://kubeschema.imranh.org/source.toolkit.fluxcd.io/v1/gitrepository
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: zfs-localpv-crds
  namespace: flux-system
spec:
  interval: "1h" # This gets patched
  url: https://github.com/openebs/zfs-localpv.git
  ref:
    tag: v2.10.1
  # Exclude everything but the CRD directory
  ignore: |
    /*
    !/deploy/yamls
---
# yaml-language-server: $schema=https://kubeschema.imranh.org/kustomize.toolkit.fluxcd.io/v1/kustomization
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crds-zfs-localpv
  namespace: flux-system
spec:
  interval: "6h"
  sourceRef:
    kind: GitRepository
    name: zfs-localpv-crds
  prune: true
  wait: true
