---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: csi-external-snapshotter
  namespace: flux-system
spec:
  interval: 1h # This gets patched
  # renovate: datasource=github-releases
  url: https://github.com/kubernetes-csi/external-snapshotter.git
  ref:
    tag: v8.2.0
  ignore: |
    # Remove everything except the CRDs deploy directory
    /*
    !/client/config/crd
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crd-csi-external-snapshotter
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: csi-external-snapshotter
  prune: true
  wait: true
