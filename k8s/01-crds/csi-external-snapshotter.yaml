---
# yaml-language-server: $schema=https://kubeschema.imranh.org/source.toolkit.fluxcd.io/v1/gitrepository
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: csi-external-snapshotter
  namespace: flux-system
spec:
  interval: 1h # This gets patched
  url: https://github.com/kubernetes-csi/external-snapshotter.git
  ref:
    tag: v8.3.0
  ignore: |
    # Remove everything except the CRDs deploy directory
    /*
    !/client/config/crd
---
# yaml-language-server: $schema=https://kubeschema.imranh.org/kustomize.toolkit.fluxcd.io/v1/kustomization
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crds-csi-external-snapshotter
  namespace: flux-system
spec:
  interval: 1h
  sourceRef:
    kind: GitRepository
    name: csi-external-snapshotter
  prune: true
  wait: true
