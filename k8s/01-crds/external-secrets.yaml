---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: external-secrets
  namespace: flux-system
spec:
  interval: "1h" # This gets patched
  url: https://github.com/external-secrets/external-secrets.git
  ref:
    semver: "~0.14.0"
  # Exclude everything but the CRD bundle directory
  ignore: |
    /*
    !/deploy/crds
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: crds-external-secrets
  namespace: flux-system
spec:
  interval: "6h"
  sourceRef:
    kind: GitRepository
    name: external-secrets
  prune: false
  wait: true
